services:
  decypharr:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.decypharr.rule=Host(`${DECYPHARR_HOST}`)"
      - "traefik.http.routers.decypharr.entrypoints=websecure"
      - "traefik.http.routers.decypharr.tls=true"
      - "traefik.http.routers.decypharr.tls.certresolver=${CERTRESOLVER}"


sonarr:
  tv:
    base_url: !env_var SONARR_URL
    api_key: !env_var SONARR_API_KEY

    delete_old_custom_formats: true

    media_management:
      propers_and_repacks: do_not_prefer

    media_naming:
      series: default
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    # quality_definition:
      # type: series

    quality_profiles:
      - trash_id: 9d142234e45d6143785ac55f5a9e8dc9
        name: WEB 1080p
        reset_unmatched_scores:
          enabled: true
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f
